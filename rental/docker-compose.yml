services:
  rental-mysql:
    image: mysql:8.4
    container_name: rental-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: rental
      MYSQL_USER: rental
      MYSQL_PASSWORD: rental
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - rental-mysql-data:/var/lib/mysql

volumes:
  rental-mysql-data:
