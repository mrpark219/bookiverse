apiVersion: apps/v1
kind: Deployment
metadata:
  name: book
  namespace: bookiverse
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book
    spec:
      initContainers:
        - name: wait-for-book-mysql
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z book-mysql 3306; do echo waiting for book-mysql; sleep 2; done"]
        - name: wait-for-kafka
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done"]
      containers:
        - name: book
          image: bookiverse/book:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://book-mysql:3306/book?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: book-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: book-password
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
          startupProbe:
            tcpSocket:
              port: 8081
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: book
  namespace: bookiverse
spec:
  selector:
    app: book
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rental
  namespace: bookiverse
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rental
  template:
    metadata:
      labels:
        app: rental
    spec:
      initContainers:
        - name: wait-for-rental-mysql
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z rental-mysql 3306; do echo waiting for rental-mysql; sleep 2; done"]
        - name: wait-for-kafka
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done"]
        - name: wait-for-book
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z book 8081; do echo waiting for book; sleep 2; done"]
      containers:
        - name: rental
          image: bookiverse/rental:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://rental-mysql:3306/rental?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: rental-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: rental-password
            - name: SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_BOOK_URL
              value: http://book:8081
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 5
          startupProbe:
            tcpSocket:
              port: 8083
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rental
  namespace: bookiverse
spec:
  selector:
    app: rental
  ports:
    - port: 8083
      targetPort: 8083
---
